<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            text-align: center;
            text-transform: uppercase;
            text-shadow: 5px 5px 5px gray;
        }
        body>div:nth-child(3){
            height: 600px;
            display: grid;
            grid-template-columns: 25% 25% 25% 25%;
            grid-template-rows: 60px 60px 250px 200px 250px 100px;
            gap: 10px 10px;
            grid-template-areas: "hdr1 hdr1 hdr1 hdr1"
                                 "hdr2 hdr2 hdr2 hdr2"

                                 "art art art1 art2"
                                 "asd asd asd1 asd1"
                                 "ftr ftr ftr ftr"
        }
        body>div:nth-child(3)>div:nth-child(1){

            border: 2px solid hotpink;
        }
